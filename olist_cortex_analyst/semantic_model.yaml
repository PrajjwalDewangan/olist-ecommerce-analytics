name: OLIST_MODEL
tables:
  - name: MART_CATEGORY_PERFORMANCE
    description: The table contains records of aggregated sales performance metrics organized by product category. Each record captures a category's financial performance, including revenue figures, order volumes, pricing averages, and customer review scores, along with a relative ranking by revenue.
    base_table:
      database: OLIST_DB
      schema: DBT_TRANSFORM
      table: MART_CATEGORY_PERFORMANCE
    dimensions:
      - name: PRODUCT_CATEGORY
        description: The product category associated with a given performance record.
        expr: PRODUCT_CATEGORY
        data_type: VARCHAR(16777216)
        sample_values:
          - bed_bath_table
          - watches_gifts
          - fixed_telephony
      - name: REVENUE_RANK
        description: The rank of a category based on its revenue performance relative to other categories.
        expr: REVENUE_RANK
        data_type: NUMBER(18,0)
        sample_values:
          - '29'
          - '3'
          - '49'
      - name: TOTAL_ITEMS
        description: The total number of items associated with each category.
        expr: TOTAL_ITEMS
        data_type: NUMBER(18,0)
        sample_values:
          - '9481'
          - '33'
          - '5865'
      - name: TOTAL_ORDERS
        description: The total number of orders placed within a given category.
        expr: TOTAL_ORDERS
        data_type: NUMBER(18,0)
        sample_values:
          - '5495'
          - '177'
          - '227'
    facts:
      - name: AVG_ITEM_PRICE
        description: The average price of items within a product category.
        expr: AVG_ITEM_PRICE
        data_type: FLOAT
        access_modifier: public_access
        sample_values:
          - '198.87941006'
          - '93.463460145'
          - '130.175627044'
      - name: AVG_REVIEW_SCORE
        description: The average review score given by customers for products within a category.
        expr: AVG_REVIEW_SCORE
        data_type: NUMBER(38,6)
        access_modifier: public_access
        sample_values:
          - '4.190172'
          - '4.140204'
          - '4.072411'
      - name: TOTAL_FREIGHT_VALUE
        description: The total freight value associated with a product category.
        expr: TOTAL_FREIGHT_VALUE
        data_type: FLOAT
        access_modifier: public_access
        sample_values:
          - '98262.77'
          - '10269.22'
          - '4327.42'
      - name: TOTAL_PRODUCT_REVENUE
        description: The total revenue generated from products within a given category.
        expr: TOTAL_PRODUCT_REVENUE
        data_type: FLOAT
        access_modifier: public_access
        sample_values:
          - '1234195.12'
          - '1031836.6'
          - '23001.46'
      - name: TOTAL_REVENUE
        description: The total revenue generated, measured in monetary units.
        expr: TOTAL_REVENUE
        data_type: FLOAT
        access_modifier: public_access
        sample_values:
          - '1235065.4'
          - '250781.34'
          - '1430.1'
    primary_key:
      columns:
        - PRODUCT_CATEGORY
  - name: MART_CUSTOMER_ANALYTICS
    description: The table contains records of customer analytics, aggregating order and spending behavior at the individual customer level. Each record includes details about the customer's geographic location, purchasing metrics such as total orders and average order value, review scores, and a customer segment classification.
    base_table:
      database: OLIST_DB
      schema: DBT_TRANSFORM
      table: MART_CUSTOMER_ANALYTICS
    dimensions:
      - name: CUSTOMER_CITY
        description: The city where the customer is located.
        expr: CUSTOMER_CITY
        data_type: VARCHAR(16777216)
        sample_values:
          - sao jose do rio pardo
          - nilopolis
          - monte mor
      - name: CUSTOMER_ID
        description: Unique identifier assigned to each customer.
        expr: CUSTOMER_ID
        data_type: VARCHAR(16777216)
        sample_values:
          - 4d25a77a0e3a69074326a44fa3712fe3
          - 0072357d0a3394d268c6abb9e30aaafe
          - e03867c72ac77eb2a2981e28ea0d0b2a
      - name: CUSTOMER_SEGMENT
        description: The segment classification assigned to a customer based on their value or behavior.
        expr: CUSTOMER_SEGMENT
        data_type: VARCHAR(10)
        sample_values:
          - low_value
          - mid_value
          - high_value
      - name: CUSTOMER_STATE
        description: The state where the customer is located.
        expr: CUSTOMER_STATE
        data_type: VARCHAR(16777216)
        sample_values:
          - CE
          - MG
          - SP
      - name: TOTAL_ORDERS
        description: The total number of orders placed by a customer.
        expr: TOTAL_ORDERS
        data_type: NUMBER(18,0)
        sample_values:
          - '1'
    facts:
      - name: AVG_ORDER_VALUE
        description: The average monetary value of orders placed by a customer.
        expr: AVG_ORDER_VALUE
        data_type: FLOAT
        access_modifier: public_access
        sample_values:
          - '368.82'
          - '399.38'
          - '379'
      - name: AVG_REVIEW_SCORE
        description: The average review score given by a customer across all their orders.
        expr: AVG_REVIEW_SCORE
        data_type: NUMBER(38,6)
        access_modifier: public_access
        sample_values:
          - '2.500000'
          - '4.000000'
          - '3.000000'
      - name: TOTAL_SPENDS
        description: The total amount spent by a customer across all their orders.
        expr: TOTAL_SPENDS
        data_type: FLOAT
        access_modifier: public_access
        sample_values:
          - '51.84'
          - '174.32'
          - '193.29'
  - name: MART_ORDER_FUNNEL
    description: The table contains records tracking order progression through a sales funnel. Each record represents a stage in the funnel process, including metrics on order volumes and conversion rates relative to the start of the funnel.
    base_table:
      database: OLIST_DB
      schema: DBT_TRANSFORM
      table: MART_ORDER_FUNNEL
    dimensions:
      - name: STAGE
        description: The stage of an order within the order fulfillment funnel.
        expr: STAGE
        data_type: VARCHAR(16777216)
        sample_values:
          - created
          - shipped
          - approved
      - name: TOTAL_ORDERS
        description: The total number of orders.
        expr: TOTAL_ORDERS
        data_type: NUMBER(18,0)
        sample_values:
          - '97585'
          - '99441'
          - '97888'
    facts:
      - name: CONVERSION_FROM_START
        description: The cumulative conversion rate at each stage of the order funnel relative to the starting point.
        expr: CONVERSION_FROM_START
        data_type: NUMBER(25,6)
        access_modifier: public_access
        sample_values:
          - '0.984383'
          - '0.981336'
          - '1.000000'
  - name: MART_PRODUCT_PERFORMANCE
    description: The table contains records of product performance metrics aggregated at the product level. Each record covers a single product and includes details about its category, sales volumes, revenue figures, freight costs, and average customer review scores.
    base_table:
      database: OLIST_DB
      schema: DBT_TRANSFORM
      table: MART_PRODUCT_PERFORMANCE
    dimensions:
      - name: PRODUCT_CATEGORY
        description: The category to which a product belongs.
        expr: PRODUCT_CATEGORY
        data_type: VARCHAR(16777216)
        sample_values:
          - housewares
          - sports_leisure
          - signaling_and_security
      - name: PRODUCT_ID
        description: Unique identifier assigned to each product.
        expr: PRODUCT_ID
        data_type: VARCHAR(16777216)
        sample_values:
          - a9a7d44cbdf7c47c958a585d66a0c3e1
          - 8f8496902e65ff58118aab478dc2a55e
          - f9471562478eba8761bc985b968a0092
      - name: TOTAL_ORDERS
