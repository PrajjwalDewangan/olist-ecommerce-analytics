        expr: TOTAL_PRODUCTS_SOLD
        data_type: NUMBER(18,0)
        sample_values:
          - '43'
          - '83'
          - '8'
    facts:
      - name: AVG_PRICE
        description: The average price of a product across all associated orders.
        expr: AVG_PRICE
        data_type: FLOAT
        access_modifier: public_access
        sample_values:
          - '69'
          - '99.99'
          - '149.333333333'
      - name: AVG_REVIEW_SCORE
        description: The average review score given by customers for a product.
        expr: AVG_REVIEW_SCORE
        data_type: NUMBER(38,6)
        access_modifier: public_access
        sample_values:
          - '4.000000'
          - '3.727273'
          - '3.982906'
      - name: TOTAL_FREIGHT_VALUE
        description: The total freight value associated with a product.
        expr: TOTAL_FREIGHT_VALUE
        data_type: FLOAT
        access_modifier: public_access
        sample_values:
          - '128.3'
          - '123.46'
          - '436.14'
      - name: TOTAL_PRODUCT_REVENUE
        description: The total revenue generated by a product across all sales.
        expr: TOTAL_PRODUCT_REVENUE
        data_type: FLOAT
        access_modifier: public_access
        sample_values:
          - '763.6'
          - '1173'
          - '1999.9'
      - name: TOTAL_REVENUE
        description: The total revenue generated from product sales.
