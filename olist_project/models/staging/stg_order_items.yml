version: 2

models:
  - name: stg_order_items
    columns:
      - name: order_id
        tests:
          - not_null
      - name: order_item_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
    tests: 
      - unique:
          column_name: "(order_id || '-' || order_item_id)"