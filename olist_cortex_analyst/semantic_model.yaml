  - name: MART_ORDER_EXPERIENCE
    description: The table contains order-level records combining delivery performance and customer satisfaction data. Each record represents a single delivered order, capturing the order date, delivery time, payment value, and the customer's review score for that order.
    base_table:
      database: OLIST_DB
      schema: DBT_TRANSFORM
      table: MART_ORDER_EXPERIENCE
    dimensions:
      - name: ORDER_ID
        description: Unique identifier assigned to each order.
        expr: ORDER_ID
        data_type: VARCHAR(16777216)
        sample_values:
          - e481f51cbdc54678b7cc49136f2d6af7
          - 9ef432eb6251297304e76186b10a928d
          - b81ef226f3fe1789b1e8b2acac839d17
    time_dimensions:
      - name: ORDER_MONTH
        description: The calendar month in which the order was purchased, used for trend and time-series analysis.
        expr: ORDER_MONTH
        data_type: DATE
        sample_values:
          - '2017-01-01'
          - '2017-06-01'
          - '2018-03-01'
    facts:
      - name: DELIVERY_TIME_DAYS
        description: The number of days between order purchase and delivery to the customer.
        expr: DELIVERY_TIME_DAYS
        data_type: NUMBER(18,0)
        access_modifier: public_access
        sample_values:
          - '7'
          - '19'
          - '35'
      - name: TOTAL_PAYMENT
        description: The total payment value for the order.
        expr: TOTAL_PAYMENT
        data_type: FLOAT
        access_modifier: public_access
        sample_values:
          - '159.33'
          - '89.90'
          - '412.50'
      - name: REVIEW_SCORE
        description: The customer's review score for the order, on a scale of 1 to 5.
        expr: REVIEW_SCORE
        data_type: NUMBER(2,0)
        access_modifier: public_access
        sample_values:
          - '5'
          - '4'
          - '1'
    primary_key:
      columns:
        - ORDER_ID
verified_queries:
